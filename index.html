<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kesling Archive D3</title>
  <meta name="theme-color" content="#16a34a" />
  <link rel="manifest" href="pwa/manifest.json" />
  <!-- Supabase dimuat duluan di head -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;font-family:system-ui,sans-serif;background:#f8fafc;}
    .splash{text-align:center;}
    .logo{width:64px;height:64px;background:linear-gradient(135deg,#16a34a,#0d9488);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 16px;}
    h1{font-size:1.4rem;font-weight:800;color:#0f172a;margin:0 0 4px;}
    p{color:#64748b;font-size:.9rem;margin:0;}
    .spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#16a34a;border-radius:50%;animation:spin .7s linear infinite;margin:24px auto 0;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
<div class="splash">
  <div class="logo">🌿</div>
  <h1>Kesling Archive D3</h1>
  <p>Arsip Digital Mahasiswa D3 Kesehatan Lingkungan</p>
  <div class="spinner"></div>
</div>
<script src="supabase/supabase.js"></script>
<script>
function waitReady(fn) {
  if (window.supabaseClient) { fn(); return; }
  document.addEventListener('supabase-ready', fn, { once: true });
}
waitReady(async () => {
  const { data: { session } } = await window.supabaseClient.auth.getSession();
  setTimeout(() => {
    window.location.href = session ? 'dashboard.html' : 'login.html';
  }, 600);
});
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('pwa/service-worker.js').catch(() => {});
}
</script>
</body>
</html>
